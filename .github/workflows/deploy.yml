name: Build & Deploy API

# main push → Docker 빌드 → ghcr.io 푸시 → AWS Lightsail 컨테이너 재배포
# (기존 SSH→홈서버 pm2 방식 폐기. 홈서버 의존 제거)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # ghcr.io 푸시

env:
  IMAGE: ghcr.io/gwon6482/lighthouse-api
  AWS_REGION: ap-northeast-2
  LIGHTSAIL_SERVICE: lighthouse-api

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (sha + latest)
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "pushed $IMAGE:${{ github.sha }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lightsail
        env:
          IMAGE_REF: ${{ env.IMAGE }}:${{ github.sha }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # 시크릿 노출 방지: python 으로 env 에서 직접 읽어 배포 스펙 작성
          python3 - <<'PY'
          import os, json
          spec = {
            "serviceName": os.environ["LIGHTSAIL_SERVICE"],
            "containers": {
              "app": {
                "image": os.environ["IMAGE_REF"],
                "environment": {
                  "NODE_ENV": "production",
                  "PORT": "8080",
                  "MONGODB_URI": os.environ["MONGODB_URI"],
                  "JWT_SECRET": os.environ["JWT_SECRET"],
                  "JWT_EXPIRES_IN": "7d",
                },
                "ports": {"8080": "HTTP"},
              }
            },
            "publicEndpoint": {
              "containerName": "app",
              "containerPort": 8080,
              "healthCheck": {
                "path": "/api/health",
                "successCodes": "200-499",
                "intervalSeconds": 10,
                "timeoutSeconds": 5,
                "healthyThreshold": 2,
                "unhealthyThreshold": 5,
              },
            },
          }
          with open("deploy.json", "w") as f:
              json.dump(spec, f)
          PY
          aws lightsail create-container-service-deployment \
            --cli-input-json file://deploy.json \
            --region "$AWS_REGION"
          rm -f deploy.json
          echo "Lightsail deployment 트리거됨: $IMAGE_REF"
